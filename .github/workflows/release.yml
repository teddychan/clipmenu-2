name: Release

# Thin caller: delegates to the shared macOS release pipeline
# (teddychan/dragon-release-ci). Build (SwiftPM + assemble .app with Sparkle),
# Developer ID-sign, notarize, staple, publish the FREE ClipMenu, push the
# EdDSA-signed Sparkle appcast to docs/clipmenu-2/, and bump the Homebrew cask.
# Triggered by a v* tag on this repo. The Mac App Store build is separate —
# clipmenu-2 builds it in its own release-mas.yml (mas-v* tag, also GitHub-hosted).
#
# Secrets are inherited from this repo's Actions secrets:
#   DEVELOPER_ID_CERT_P12_BASE64, DEVELOPER_ID_CERT_PASSWORD,
#   NOTARY_KEY_P8_BASE64, NOTARY_KEY_ID, NOTARY_ISSUER_ID,
#   PUBLIC_RELEASE_TOKEN, SPARKLE_EDDSA_PRIVATE_KEY
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# The reusable release workflow creates the GitHub Release and uploads assets,
# which needs contents: write. This repo's default workflow token is read-only,
# so grant write here or the reusable call is rejected at startup.
permissions:
  contents: write

jobs:
  release:
    uses: teddychan/dragon-release-ci/.github/workflows/release-macos.yml@v3
    secrets: inherit
    with:
      build_kind: swiftpm
      app_slug: clipmenu-2
      release_title_prefix: ''            # title == tag
      bot_name: ClipMenu Release Bot
      swiftpm_working_directory: app
      swiftpm_sparkle: true
      # ClipMenu targets the macOS 26 SDK, so build on the macos-26 hosted image.
      swiftpm_runner: macos-26
      # Sign the free direct/Homebrew build with iCloud: embeds the Developer ID iCloud
      # provisioning profile (PROVISIONING_PROFILE_BASE64) + these entitlements. Falls
      # back to local-only if the profile secret is absent.
      swiftpm_icloud_entitlements_path: app/ClipMenu.entitlements
      zip_name_template: 'ClipMenu-{MAJOR}-{TAG}.zip'
      zip_keep_parent: true
      generate_appcast_glob: swiftpm
