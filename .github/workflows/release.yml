name: Release

# Thin caller: delegates to the shared macOS release pipeline
# (teddychan/dragon-release-ci). Build (SwiftPM + assemble .app with Sparkle),
# Developer ID-sign, notarize, staple, publish the FREE ClipMenu, push the
# EdDSA-signed Sparkle appcast to docs/clipmenu-2/, and bump the Homebrew cask.
# Triggered by a v* tag on this repo. The private clipmenu-2-premium repo builds
# only the Mac App Store variant (its own self-hosted workflow).
#
# Secrets are inherited from this repo's Actions secrets:
#   DEVELOPER_ID_CERT_P12_BASE64, DEVELOPER_ID_CERT_PASSWORD,
#   NOTARY_KEY_P8_BASE64, NOTARY_KEY_ID, NOTARY_ISSUER_ID,
#   PUBLIC_RELEASE_TOKEN, SPARKLE_EDDSA_PRIVATE_KEY
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  release:
    uses: teddychan/dragon-release-ci/.github/workflows/release-macos.yml@v1
    secrets: inherit
    with:
      build_kind: swiftpm
      app_slug: clipmenu-2
      release_title_prefix: ''            # title == tag
      bot_name: ClipMenu Release Bot
      swiftpm_working_directory: app
      swiftpm_sparkle: true
      zip_name_template: 'ClipMenu-{MAJOR}-{TAG}.zip'
      zip_keep_parent: true
      generate_appcast_glob: swiftpm
